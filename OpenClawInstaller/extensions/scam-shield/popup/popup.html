<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 詐騙防護</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .title h1 { font-size: 16px; font-weight: 600; }
    .title span { font-size: 12px; color: #888; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(0,255,136,0.1);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status.active { background: rgba(0,255,136,0.15); }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff88;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .section { margin-bottom: 16px; }
    .section h3 {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      color: #1a1a2e;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,217,255,0.3); }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 700; color: #00d9ff; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
    .result {
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .result.show { display: block; }
    .result.safe { background: rgba(0,255,136,0.15); border: 1px solid rgba(0,255,136,0.3); }
    .result.danger { background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3); }
    .result-title { font-weight: 600; margin-bottom: 4px; }
    .result-desc { font-size: 12px; opacity: 0.8; }
    .footer {
      text-align: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🦞</div>
    <div class="title">
      <h1>OpenClaw 詐騙防護</h1>
      <span>v1.0.0</span>
    </div>
  </div>

  <div class="status active">
    <div class="status-dot"></div>
    <span>即時防護已啟用</span>
  </div>

  <div class="section">
    <h3>快速檢測</h3>
    <input type="text" id="checkUrl" placeholder="輸入網址進行檢測..." 
      style="width:100%; padding:12px; border-radius:8px; border:none; 
             background:rgba(255,255,255,0.1); color:#fff; margin-bottom:8px;">
    <button class="btn btn-primary" onclick="checkUrl()">開始檢測</button>
    <div id="result" class="result"></div>
  </div>

  <div class="section">
    <h3>統計</h3>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="blockedCount">0</div>
        <div class="stat-label">已攔截</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="scannedCount">0</div>
        <div class="stat-label">已掃描</div>
      </div>
    </div>
  </div>

  <div class="section">
    <button class="btn btn-secondary" onclick="scanPage()">🔍 掃描當前頁面</button>
  </div>

  <div class="footer">
    Powered by OpenClaw • 保護您的上網安全
  </div>

  <script src="popup.js"></script>
</body>
</html>
